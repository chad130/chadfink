{{ define "main" }}
  <header class="page-header">
    <p class="eyebrow">Archive</p>
    <h1>{{ .Title }}</h1>
    {{ with .Content }}
      <div class="page-header-copy">{{ . }}</div>
    {{ else }}
      <p class="page-header-copy">A clean archive of every published post.</p>
    {{ end }}
  </header>

  <div class="post-list">
    {{ range .Paginator.Pages }}
      {{ partial "post-card.html" . }}
    {{ else }}
      <p>No posts yet.</p>
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
{{ end }}
