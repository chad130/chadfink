baseURL = "https://chad130.github.io/chadfink/"
languageCode = "en-us"
title = "Chad Fink's Blog"
enableRobotsTXT = true

[pagination]
  pagerSize = 8

[permalinks]
  posts = "/posts/:slugorcontentbasename/"

[params]
  description = "A fast, simple, modern blog built with Hugo."
  author = "Chad Fink"
  showReadingTime = true

[frontmatter]
  date = ["date", "publishDate", "lastmod", ":filename", ":fileModTime"]
  lastmod = ["lastmod", "date", ":fileModTime"]
  publishDate = ["publishDate", "date", ":fileModTime"]
  expiryDate = ["expiryDate"]

[markup]
  [markup.highlight]
    style = "github"
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.extras]
        [markup.goldmark.extensions.extras.mark]
          enable = true
    [markup.goldmark.renderer]
      unsafe = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Posts"
    url = "/posts/"
    weight = 2
